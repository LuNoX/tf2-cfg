//medic settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec binds

//medigun checker script
exec medicheck; orig_medic

//crosshair switcher
exec crosshairswitcher/switcher; medic

// HUD Uber Counter (activated by opening and closing any voice menu)
alias +uber_counter "voice_menu_1"
alias -uber_counter "voice_menu_1"
bind backspace +uber_counter

// Medic Ping Health Callouts
alias "autocall_default" "hud_medicautocallersthreshold "75""
alias "autocall_ping" "hud_medicautocallersthreshold "150""
alias "+medic_ping" "ping"
alias "-medic_ping" "autocall_default"

alias needles "weapon1; autocall_default"
alias medigun "weapon2; autocall_default"
alias saw "weapon3; autocall_ping"

// Masking, Faking and Charging
alias fakeuber "voicemenu 1 7; say_team "*** FAKED CHARGE ***""
alias maskuber "voicemenu 0 0; say_team "*** CHARGE READY ***""
alias "+charge" "+attack2;medigun;dropitem;say_team "*** CHARGE USED - LETS GO! ***";voicemenu 0 0;"
alias "-charge" "-attack2"
alias +class_specific_ctrl_layer "bind r fakeuber"
alias -class_specific_ctrl_layer "bind r maskuber"

// Scroll through vaccinator modes
bind mwheelup +reload
// Bind MvM projectile shield to mouse3 as m3 is bound to reload otherwise
bind mouse3 +attack3

// Binds
bind r maskuber
bind mouse2 "+charge"
bind q needles
bind e medigun
bind f saw