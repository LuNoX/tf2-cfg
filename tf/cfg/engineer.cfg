//engineer settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec binds

//medigun checker script
exec medicheck; orig_engineer

//crosshair switcher
exec crosshairswitcher/switcher; engineer

// Quickbuild
alias build_sentry "build 2 0; voicemenu 0 3"
alias build_dispenser "build 0 0; voicemenu 0 3"
alias build_entrance "build 1 0; voicemenu 0 3"
alias build_exit "build 1 1; voicemenu 0 3"

// Quickdestroy
alias destroy_sentry "destroy 2 0; voicemenu 0 3"
alias destroy_dispenser "destroy 0 0; voicemenu 0 3"
alias destroy_entrance "destroy 1 0; voicemenu 0 3"
alias destroy_exit "destroy 1 1; voicemenu 0 3"

// Binds
bind 1 build_sentry
bind 2 build_dispenser
bind 3 build_entrance
bind 4 build_exit

bind F1 destroy_sentry
bind F2 destroy_dispenser
bind F3 destroy_entrance
bind F4 destroy_exit