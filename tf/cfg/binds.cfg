//stock non class-specific binds
//Made with cfg.tf - custom Team Fortress 2 config generator

bind w +forward
bind a +moveleft
bind s +back
bind d +moveright
bind mouse1 +attack
bind mouse2 +attack2
bind mwheeldown +jump
bind t say_team
bind y say
bind g +taunt
bind z voice_menu_1
bind x voice_menu_2
bind c voice_menu_3
bind , changeclass
bind . changeteam
bind m open_charinfo_direct
bind n +quickswitchmenu
bind space +jump
bind shift +duck
bind tab +showscores
bind escape cancelselect
bind j cl_trigger_first_notification
bind k cl_decline_first_notification
bind l dropitem
bind v lastdisguise
bind f +inspect
bind mouse5 +voicerecord
bind HOME load_itempreset 0
bind DELETE load_itempreset 1
bind PGUP load_itempreset 2
bind PGDN load_itempreset 3
bind i showmapinfo
bind 7 slot7
bind 8 slot8
bind 9 slot9
bind o "impulse 201"
bind 6 slot6
bind F5 screenshot
// bind F6 "" 
bind F7 player_ready_toggle
bind F8 show_quest_log
bind mouse3 +reload
bind bind mouse4 "voicemenu 0 0"

// Control layer
alias +global_ctrl_layer "bind mouse4 "voicemenu 0 1""
alias -global_ctrl_layer "bind mouse4 "voicemenu 0 0""
alias reset_ctrl_layer "alias +class_specific_ctrl_layer ""; alias -class_specific_ctrl_layer """
reset_ctrl_layer
alias +ctrl_layer "+global_ctrl_layer; +class_specific_ctrl_layer"
alias -ctrl_layer "-global_ctrl_layer; -class_specific_ctrl_layer"
bind ctrl +ctrl_layer

// Clear class specfic binds
unbind mwheelup
unbind r
unbind backspace
unbind 1
unbind 2
unbind 3
unbind 4
unbind F1
unbind F2
unbind F3
unbind F4

exec tweaks/tabgraph