//stock non class-specific binds
//Made with cfg.tf - custom Team Fortress 2 config generator

bind w +forward
bind a +moveleft
bind s +back
bind d +moveright
bind mouse1 +attack
bind mouse2 +attack2
bind mwheeldown +jump
bind t say_team
bind y say
bind g +taunt
bind z voice_menu_1
bind x voice_menu_2
bind c voice_menu_3
bind , changeclass
bind . changeteam
bind m open_charinfo_direct
bind n +quickswitchmenu
bind / toggleconsole
bind space +jump
bind shift +duck
bind tab +showscores
bind escape cancelselect
bind j cl_trigger_first_notification
bind k cl_decline_first_notification
bind l dropitem
bind v lastdisguise
bind mouse4 +voicerecord
bind home "load_itempreset 0"
bind del "load_itempreset 1"
bind pgup "load_itempreset 2"
bind pgdn "load_itempreset 3"
bind i showmapinfo
bind 7 slot7
bind 8 slot8
bind 9 slot9
bind u "impulse 201"
bind 6 slot6
bind F5 screenshot
// bind F6 "" 
bind F7 player_ready_toggle
bind F8 show_quest_log
bind mouse3 +reload
bind mouse5 "voicemenu 0 0"

// Control layer
alias v_medic "voicemenu 0 0"
alias v_thanks "voicemenu 0 1"
alias +global_ctrl_layer "bind mouse5 v_thanks"
alias -global_ctrl_layer "bind mouse5 v_medic"
alias reset_ctrl_layer "alias +class_specific_ctrl_layer ""; alias -class_specific_ctrl_layer """
reset_ctrl_layer
alias +ctrl_layer "+global_ctrl_layer; +class_specific_ctrl_layer"
alias -ctrl_layer "-global_ctrl_layer; -class_specific_ctrl_layer"
bind ctrl +ctrl_layer

// Clear class specfic binds
unbind mwheelup
unbind r
unbind backspace // I have caps lock remapped to backspace
unbind 1
unbind 2
unbind 3
unbind 4
unbind F1
unbind F2
unbind F3
unbind F4

exec tweaks/tabgraph