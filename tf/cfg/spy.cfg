//spy settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec binds

//crosshair switcher
exec crosshairswitcher/switcher; spy

// FWD declaration
alias reset_disguises "echo "reset_disguises has not been initialized yet""

// Enemy disguises
alias enemy_scout "disguise 1 -1; play vo\scout_yes01; reset_disguises"
alias enemy_sniper "disguise 2 -1; play vo\sniper_yes03; reset_disguises"
alias enemy_soldier "disguise 3 -1; play vo\soldier_yes04; reset_disguises"
alias enemy_demoman "disguise 4 -1; play vo\demoman_yes01; reset_disguises"
alias enemy_medic "disguise 5 -1; play vo\medic_yes03; reset_disguises"
alias enemy_heavy "disguise 6 -1; play vo\heavy_yes03; reset_disguises"
alias enemy_pyro "disguise 7 -1; play vo\pyro_moveup01; reset_disguises"
alias enemy_spy "disguise 8 -1; play vo\spy_yes02; reset_disguises"
alias enemy_engineer "disguise 9 -1; play vo\engineer_yes03; reset_disguises"

alias reset_common_diguises_team "alias disguise_spy enemy_spy; alias disguise_scout enemy_scout; alias disguise_pyro enemy_pyro"
alias reset_uncommon_disguises_team "alias disguise_sniper enemy_sniper; alias disguise_engineer enemy_engineer; alias disguise_medic enemy_medic"
alias reset_rare_disguises_team "alias disguise_soldier enemy_soldier; alias disguise_demoman enemy_demoman; alias disguise_heavy enemy_heavy"
alias reset_disguise_team "reset_common_diguises_team; reset_uncommon_disguises_team; reset_rare_disguises_team"
reset_disguise_team

// Team disguises
alias allied_scout "disguise 1 -2; play vo\scout_no02; reset_disguises"
alias allied_sniper "disguise 2 -2; play vo\sniper_no01; reset_disguises"
alias allied_soldier "disguise 3 -2; play vo\soldier_no02; reset_disguises"
alias allied_demoman "disguise 4 -2; play vo\demoman_no03; reset_disguises"
alias allied_medic "disguise 5 -2; play vo\medic_no01; reset_disguises"
alias allied_heavy "disguise 6 -2; play vo\heavy_no03; reset_disguises"
alias allied_pyro "disguise 7 -2; play vo\pyro_no01; reset_disguises"
alias allied_spy "disguise 8 -2; play vo\spy_no03; reset_disguises"
alias allied_engineer "disguise 9 -2; play vo\engineer_no01; reset_disguises"

alias switch_common_diguises_team "alias disguise_spy allied_spy; alias disguise_scout allied_scout; alias disguise_pyro allied_pyro"
alias switch_uncommon_disguises_team "alias disguise_sniper allied_sniper; alias disguise_engineer allied_engineer; alias disguise_medic allied_medic"
alias switch_rare_disguises_team "alias disguise_soldier allied_soldier; alias disguise_demoman allied_demoman; alias disguise_heavy allied_heavy"
alias switch_disguise_team "switch_common_diguises_team; switch_uncommon_disguises_team; switch_rare_disguises_team"

// Disguise Team Toggling
alias toggle_disguise_team "echo "toggle_disguise_team has not been initialized yet""
alias reset_disguise_team_and_alias "echo "reset_disguise_team_and_alias has not been initialized yet""
alias switch_disguise_team_and_alias "switch_disguise_team; alias toggle_disguise_team reset_disguise_team_and_alias"
alas reset_disguise_team_and_alias "reset_disguise_team; alias toggle_disguise_team switch_disguise_team_and_alias"
alias toggle_disguise_team switch_disguise_team_and_alias

// Pseudo Random Disguise
alias random_disguise1 "echo "random_disguise1 has not been initialized yet""
alias random_disguise random_disguise1
alias random_disguise12 "disguise_engineer; alias random_disguise random_disguise1"
alias random_disguise11 "disguise_sniper; alias random_disguise random_disguise12"
alias random_disguise10 "disguise_spy; alias random_disguise random_disguise11"
alias random_disguise9 "disguise_scout; alias random_disguise random_disguise10"
alias random_disguise8 "disguise_medic; alias random_disguise random_disguise9"
alias random_disguise7 "disguise_pyro; alias random_disguise random_disguise8"
alias random_disguise6 "disguise_engineer; alias random_disguise random_disguise7"
alias random_disguise5 "disguise_sniper; alias random_disguise random_disguise6"
alias random_disguise4 "disguise_spy; alias random_disguise random_disguise5"
alias random_disguise3 "disguise_scout; alias random_disguise random_disguise4"
alias random_disguise2 "disguise_spy; alias random_disguise random_disguise3"
alias random_disguise1 "disguise_pyro; alias random_disguise random_disguise2"

// Quick disguise binds
alias common_disguises "bind 1 disguise_spy; bind 2 disguise_scout; bind 3 disguise_pyro"
alias uncommon_disguises "bind 1 disguise_sniper; bind 2 disguise_engineer; bind 3 disguise_medic"
alias rare_disguises "bind 1 disguise_soldier; bind 2 disguise_demoman; bind 3 disguise_heavy"
alias reset_disguise_binds "bind 1 common_disguises; bind 2 uncommon_disguises; bind 3 rare_disguises"
reset_disguise_binds
alias reset_disguises "reset_disguise_team; reset_disguise_binds"
bind 4 toggle_disguise_team
bind r random_disguise

// Disguised Weapon Switcher
alias "+disguised_wep1" "slot1; lastdisguise"
alias "-disguised_wep1" "lastinv"
alias "+disguised_wep2" "slot2; lastdisguise"
alias "-disguised_wep2" "lastinv"
alias "+disguised_wep3" "slot3; lastdisguise"
alias "-disguised_wep3" "lastinv"
alias "+disguised_wep4" "slot4; lastdisguise"
alias "-disguised_wep4" "lastinv"

bind "F1" "+disguised_wep1"
bind "F2" "+disguised_wep2"
bind "F3" "+disguised_wep3"
bind "F4" "+disguised_wep4"